<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusBank | Open Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-layout">
        <div class="auth-hero" style="background: linear-gradient(135deg, #004D40 0%, #00796B 100%);">
            <h1>Join NexusBank</h1>
            <p>Open your account in minutes. Benefit from military-grade encryption and device-bound security.</p>
        </div>
        <div class="auth-content">
            <div class="auth-card">
                <h2>Create Account</h2>
                <p class="subtitle">Set up your secure banking credentials.</p>
                
                <div id="alert-box" class="alert"></div>

                <form id="register-form">
                    <div class="form-group">
                        <label for="username">Choose Username</label>
                        <input type="text" id="username" placeholder="john.doe" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="password">Create Password</label>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" placeholder="••••••••" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn">Open Account</button>
                </form>

                <div class="links">
                    <p>Already a customer? <a href="index.html">Sign in instead</a></p>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
